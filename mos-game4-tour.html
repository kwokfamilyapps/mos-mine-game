<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>鞍山探索館 — 互動導賞團 V1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#e2e8f0;font-family:sans-serif;overflow:hidden;height:100dvh;touch-action:none}
#app{display:flex;flex-direction:column;height:100dvh;max-width:500px;margin:0 auto}
#title{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:linear-gradient(180deg,#0a0e1a,#1a1f2e);padding:20px;text-align:center}
#title .logo{color:#fbbf24;font-size:12px;letter-spacing:3px;margin-bottom:10px}
#title h1{color:#e2e8f0;font-size:24px;margin-bottom:5px}
#title .sub{color:#94a3b8;font-size:13px;margin-bottom:25px}
#title .btn{padding:12px 50px;border-radius:8px;border:1px solid #38bdf8;background:rgba(56,189,248,0.1);color:#38bdf8;font-size:16px;cursor:pointer}
#photo-area{flex:1;position:relative;background:#1a1f2e;display:flex;align-items:center;justify-content:center;overflow:hidden}
#photo{width:100%;height:100%;object-fit:cover}
#narration{background:#141b2d;padding:16px;border-top:1px solid #1e2a3a;min-height:160px;display:flex;flex-direction:column}
#speaker{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
#avatar{width:40px;height:40px;border-radius:50%;background:#38bdf8;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
#speech{font-size:15px;line-height:1.6;color:#e2e8f0;flex:1}
#nav{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.nav-btn{padding:8px 20px;border-radius:6px;border:1px solid #1e2a3a;background:#0f1525;color:#94a3b8;font-size:14px;cursor:pointer}
.nav-btn:active{background:#1e2a3a}
.nav-btn.active{color:#38bdf8;border-color:#38bdf8}
#progress{display:flex;gap:4px;justify-content:center;margin:5px 0}
.dot{width:8px;height:8px;border-radius:50%;background:#1e2a3a}
.dot.active{background:#38bdf8}
.dot.done{background:#4ade80}
#location-tag{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.7);padding:4px 12px;border-radius:6px;font-size:12px;color:#fbbf24;z-index:10}
</style>
</head>
<body>
<div id="app">
<div id="title">
  <div class="logo">⛏️ 鞍山探索館</div>
  <h1>互動導賞團</h1>
  <div class="sub">由240ML礦洞出發，穿越礦村歷史<br>全程約 10 個景點</div>
  <a class="btn" id="startBtn">🎧 開始導賞</a>
</div>
<div id="photo-area" style="display:none">
  <div id="location-tag">📍 240ML 礦洞入口</div>
  <canvas id="sceneCanvas"></canvas>
</div>
<div id="narration" style="display:none">
  <div id="speaker"><div id="avatar">👩‍🏫</div><div id="speech">歡迎來到鞍山探索館！我哋嘅旅程由240ML礦洞開始...</div></div>
  <div id="progress"></div>
  <div id="nav">
    <button class="nav-btn" id="prevBtn">← 上一站</button>
    <span id="stepCounter" style="color:#475569;font-size:12px">1/10</span>
    <button class="nav-btn" id="nextBtn">下一站 →</button>
  </div>
</div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

const tourStops=[
 {id:'240ml',name:'240ML 礦洞入口',desc:'我哋而家喺海拔240米嘅主礦洞入口。呢度係馬鞍山鐵礦場嘅心臟地帶，1960年代有超過1000名礦工喺度開工。礦工每日要喺警衛室翻名牌 —— 紅色代表入礦，綠色代表出礦。礦洞有四層結構：240ML > 192ML > 144ML > 110ML，斜路同豎井連接各層。',camera:[0,3,8],target:[0,0,0],color:0x87ceeb},
 {id:'tunnel',name:'礦洞內部',desc:'走入礦洞，你會見到方形混凝土嘅入口結構，係當年英國工程師設計。礦洞入面有抽氣扇通風系統、儲水設施「一箱全家240ML」。礦工用電石燈照明，戴頭盔同防塵口罩，每日工作12小時。',camera:[2,2,5],target:[0,0,0],color:0x0a0a0a},
 {id:'cart',name:'運礦路軌',desc:'採出嚟嘅鐵礦石由礦車沿路軌運送。礦車由240ML開始，經斜路同豎井落到110ML主坑道。110ML坑道長約2,200米，由電動火車將礦石運去選礦廠。',camera:[-3,2,6],target:[0,0,0],color:0x8ba8c4},
 {id:'church',name:'信義會恩光堂',desc:'恩光堂係礦村最重要嘅建築之一。1950年代由信義會建立，白色牆身配青苔屋頂，小鐘樓上嘅紅色十字架係礦村地標。教堂唔單止係崇拜地方，仲係礦工子女嘅學校同社區中心。',camera:[5,2,5],target:[0,0,0],color:0x87ceeb},
 {id:'stjoseph',name:'天主堂聖若瑟堂',desc:'礦村第二間教堂，由天主教會建立。當年礦工來自五湖四海，有客家、潮州、鶴佬人，兩間教堂分別服務唔同社群。教堂旁邊有診所，修女會幫礦工睇病。',camera:[-4,2,6],target:[0,0,0],color:0x87ceeb},
 {id:'market',name:'天光墟',desc:'恩光堂門外嘅小路，就係昔日嘅天光墟 —— 清晨6點到7點營業嘅市集。菜檔、魚檔（擔魚由西貢上山）、豬肉檔、燒餅佬、雲吞麵店、士多... 礦工妻子朝朝喺度買餸，小朋友買糖，好熱鬧。',camera:[4,1.5,7],target:[0,0,0],color:0xd4a373},
 {id:'village',name:'礦村四區',desc:'礦村分四個區：山頂區（教會）、馬鞍橋區、潮洲村區同碼頭區。每區有唔同嘅社群文化。礦工屋係石屎建築，簡樸但實用。村內有學校、士多、波樓，係一個完整嘅小社區。',camera:[-2,3,8],target:[0,0,0],color:0x8ba8c4},
 {id:'factory',name:'選礦廠',desc:'1954年建成嘅選礦廠，係當時全東南亞最大。七步流程：碎礦機 > 振動篩 > 乾選機（電磁）> 球磨機+棒磨機 > 濕選機 > 脫磁/沉澱/真空脫水 > 運輸帶至碼頭。technology 好先進！',camera:[3,2,7],target:[0,0,0],color:0x8ba8c4},
 {id:'pier',name:'碼頭區',desc:'呢度就係今日耀安邨一帶，昔日嘅礦石碼頭。鐵礦石經運輸帶送到碼頭，裝上「大寶山號」同「大寶石號」貨輪，運去日本八幡製鐵所。碼頭有吊機同輸送帶，好有工業氣勢。',camera:[0,2,10],target:[0,0,0],color:0x87ceeb},
 {id:'end',name:'耀安邨（結語）',desc:'1976年，馬鞍山鐵礦場因成本問題結業。礦村居民陸續搬走，直至1990年代政府發展馬鞍山新市鎮，起咗耀安邨、欣安邨。今日我哋行過耀安邨停車場，好難想像呢度以前係礦石碼頭。但係鞍山探索館會繼續訴說呢段香港工業歷史。感謝收聽！',camera:[0,0,0],target:[1,0,0],color:0x6a7a8a}
];

let currentStep=0;
const canvas=document.getElementById('sceneCanvas');
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,canvas.clientWidth/canvas.clientHeight,0.1,100);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(canvas.clientWidth,canvas.clientHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
canvas.appendChild(renderer.domElement);

// Minimal scene for each stop - just terrain + fog
const sun=new THREE.DirectionalLight(0xffeecc,1.5);
sun.position.set(10,20,10);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x404060,0.5));

// Ground
const g=new THREE.PlaneGeometry(30,30,10,10);
const t=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:0x4a7a3a,roughness:0.9,side:THREE.DoubleSide}));
t.rotation.x=-Math.PI/2;t.position.y=-0.5;
scene.add(t);

// Mountains
for(let i=0;i<8;i++){
 const a=Math.random()*Math.PI*2,d=8+Math.random()*8,h=3+Math.random()*5;
 const m=new THREE.Mesh(new THREE.ConeGeometry(2+Math.random()*2,h,5),new THREE.MeshStandardMaterial({color:0x2a2a4a,flatShading:true}));
 m.position.set(Math.cos(a)*d,h/2,Math.sin(a)*d);
 scene.add(m);
}

// Trees
for(let i=0;i=20;i++){
 const x=(Math.random()-0.5)*30,z=(Math.random()-0.5)*30;
 if(Math.abs(x)<3&&Math.abs(z)<3)continue;
 const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.15,0.6,4),new THREE.MeshStandardMaterial({color:0x4a3520}));
 tr.position.set(x,0.1,z);
 const f=new THREE.Mesh(new THREE.SphereGeometry(0.3+Math.random()*0.2,4,4),new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.3+Math.random()*0.1,0.4,0.2)}));
 f.position.set(x,0.6+Math.random()*0.3,z);
 scene.add(tr);scene.add(f);
}

function goToStep(idx){
 currentStep=Math.max(0,Math.min(tourStops.length-1,idx));
 const stop=tourStops[currentStep];
 document.getElementById('location-tag').textContent='📍 '+stop.name;
 document.getElementById('speech').textContent=stop.desc;
 document.getElementById('stepCounter').textContent=(currentStep+1)+'/'+tourStops.length;
 
 // Camera
 camera.position.set(stop.camera[0],stop.camera[1],stop.camera[2]);
 camera.lookAt(stop.target[0],stop.target[1],stop.target[2]);
 
 // Scene
 scene.background=new THREE.Color(stop.color);
 scene.fog=new THREE.Fog(stop.color,15,40);
 
 // Progress dots
 const dots=document.getElementById('progress');
 dots.innerHTML='';
 tourStops.forEach((_,i)=>{
  const d=document.createElement('div');d.className='dot';
  if(i===currentStep)d.classList.add('active');
  else if(i<currentStep)d.classList.add('done');
  dots.appendChild(d);
 });
}

document.getElementById('prevBtn').addEventListener('click',()=>goToStep(currentStep-1));
document.getElementById('nextBtn').addEventListener('click',()=>goToStep(currentStep+1));
document.getElementById('startBtn').addEventListener('click',()=>{
 document.getElementById('title').style.display='none';
 document.getElementById('photo-area').style.display='flex';
 document.getElementById('narration').style.display='flex';
 goToStep(0);
});

function resize(){
 const w=canvas.parentElement.clientWidth,h=canvas.parentElement.clientHeight;
 renderer.setSize(w,h);
 camera.aspect=w/h;
 camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize);
setTimeout(resize,100);

// Animate subtle rotation
function animate(){
 // Gentle rotation of scene for atmosphere
 const stop=tourStops[currentStep];
 if(stop){
  // Slight sway
  const time=Date.now()*0.0003;
  camera.position.y=stop.camera[1]+Math.sin(time)*0.3;
 }
 renderer.render(scene,camera);
 requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
