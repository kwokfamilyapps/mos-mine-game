<!DOCTYPE html>
<html lang="zh-HK">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>天光墟 動畫 Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh}
#c{width:100%;max-width:900px;aspect-ratio:16/9;display:block;border-radius:12px;box-shadow:0 0 60px rgba(212,168,67,0.12)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H; function resize(){W=c.width=c.clientWidth;H=c.height=c.clientHeight} resize(); window.onresize=resize;
const TOTAL=500; let frame=0;

function draw(){
  const t=frame/TOTAL;
  ctx.clearRect(0,0,W,H);
  
  // Dark pre-dawn sky → brightening
  const skyBright=Math.min(1,t*1.8);
  const r=Math.floor(20+skyBright*180);
  const g=Math.floor(15+skyBright*150);
  const b=Math.floor(30+skyBright*180);
  ctx.fillStyle=`rgb(${r},${g},${b})`;
  ctx.fillRect(0,0,W,H);
  
  // Sun rising (left side, low)
  if(t>0.3){
    const sunAlpha=Math.min(1,(t-0.3)*5);
    const sunX=W*0.15; const sunY=H*(0.7-t*0.15);
    const grd=ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,80);
    grd.addColorStop(0,`rgba(255,200,100,${sunAlpha*0.6})`);
    grd.addColorStop(1,`rgba(255,200,100,0)`);
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(sunX,sunY,80,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgba(255,220,150,${sunAlpha*0.8})`;
    ctx.beginPath(); ctx.arc(sunX,sunY,15,0,Math.PI*2); ctx.fill();
  }
  
  // Distant mountains
  ctx.fillStyle='#2a3a1a';
  ctx.beginPath(); ctx.moveTo(0,H*0.5);
  for(let x=0;x<=W;x+=5){ctx.lineTo(x,H*(0.5+Math.sin(x*0.003)*0.06+Math.sin(x*0.007+1)*0.03))}
  ctx.lineTo(W,H*0.65); ctx.lineTo(0,H*0.65); ctx.closePath(); ctx.fill();
  
  // Mist layer
  ctx.fillStyle=`rgba(200,220,200,${0.15-t*0.08})`;
  ctx.fillRect(0,H*0.35,W,H*0.2);
  
  // Ground / market area
  ctx.fillStyle='#3a4a2a'; ctx.fillRect(0,H*0.6,W,H*0.4);
  
  // Market stalls along the path
  const stallColors=['#5c3a1a','#4a3a2a','#5a4a2a','#3a4a3a','#4a3a3a'];
  for(let i=0;i<6;i++){
    const sx=W*(0.08+i*0.14); const sy=H*(0.58+Math.sin(i)*0.02);
    // Stall canopy
    ctx.fillStyle=stallColors[i%5];
    ctx.fillRect(sx,sy,40,25);
    ctx.fillStyle='#6b5a3a';
    ctx.fillRect(sx-2,sy-8,44,8);
    // Table
    ctx.fillStyle='#4a3a2a'; ctx.fillRect(sx+4,sy+4,32,4);
  }
  
  // Stall signs
  ctx.fillStyle='#d4a843'; ctx.font='6px sans-serif'; ctx.textAlign='center';
  const signs=['菜','魚','豬肉','燒餅','雜貨','糖'];
  signs.forEach((s,i)=>{
    ctx.fillStyle='#8b6f3a'; ctx.fillRect(W*(0.08+i*0.14)+12,H*(0.58+Math.sin(i)*0.02)-6,16,6);
    ctx.fillStyle='#d4a843'; ctx.font='5px serif'; ctx.textAlign='center';
    ctx.fillText(s,W*(0.08+i*0.14)+20,H*(0.58+Math.sin(i)*0.02)-1);
  });
  
  // Fishmonger walking in (animated)
  const fishX=W*(-0.1+Math.min(1,t*1.5)*(0.7));
  const fishY=H*0.63+Math.sin(frame*0.1)*3;
  // Pole
  ctx.strokeStyle='#4a3a2a'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(fishX-15,fishY-15); ctx.lineTo(fishX+15,fishY-15); ctx.stroke();
  // Fish baskets
  ctx.fillStyle='#6b4a2a'; ctx.beginPath();
  ctx.ellipse(fishX-10,fishY-5,8,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(fishX+10,fishY-5,8,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#8b6a4a';
  ctx.font='10px sans-serif'; ctx.textAlign='center'; ctx.fillText('🐟',fishX-10,fishY-8);
  ctx.fillText('🐟',fishX+10,fishY-8);
  // Fishmonger body
  ctx.fillStyle='#3a5a7a'; ctx.fillRect(fishX-4,fishY-12,8,15);
  ctx.fillStyle='#f5c8a0'; ctx.beginPath(); ctx.arc(fishX,fishY-16,5,0,Math.PI*2); ctx.fill();
  // Straw hat
  ctx.fillStyle='#8b7a5a'; ctx.beginPath();
  ctx.ellipse(fishX,fishY-22,9,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillRect(fishX-3,fishY-24,6,4);
  // Sweat drops
  ctx.fillStyle='rgba(100,180,255,0.6)';
  ctx.beginPath(); ctx.arc(fishX-2,fishY-12,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(fishX+3,fishY-10,1,0,Math.PI*2); ctx.fill();
  
  // Flatbread baker (right side)
  const bakerX=W*0.6; const bakerY=H*0.6;
  ctx.fillStyle='#4a3a2a'; ctx.fillRect(bakerX,bakerY,30,20);
  // Fire/grill glow
  const fireGlow=0.5+Math.sin(frame*0.08)*0.3;
  const grd2=ctx.createRadialGradient(bakerX+15,bakerY+8,0,bakerX+15,bakerY+8,12);
  grd2.addColorStop(0,`rgba(255,100,0,${fireGlow*0.5})`);
  grd2.addColorStop(1,`rgba(255,100,0,0)`);
  ctx.fillStyle=grd2; ctx.beginPath(); ctx.arc(bakerX+15,bakerY+8,12,0,Math.PI*2); ctx.fill();
  // Baker
  ctx.fillStyle='#5a4a3a'; ctx.fillRect(bakerX+8,bakerY-10,5,12);
  ctx.fillStyle='#f5c8a0'; ctx.beginPath(); ctx.arc(bakerX+10,bakerY-14,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='8px sans-serif'; ctx.textAlign='center';
  ctx.fillText('🫓',bakerX+15,bakerY+4);
  
  // Children at candy store
  const kidX=W*0.85; const kidY=H*0.61;
  // Store window
  ctx.fillStyle='#3a4a5a'; ctx.fillRect(kidX-20,kidY-8,35,20);
  ctx.fillStyle='rgba(255,200,100,0.3)'; ctx.fillRect(kidX-16,kidY-4,27,12);
  // Candy jars (colored circles)
  const candyColors=['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff','#44ffff'];
  candyColors.forEach((col,i)=>{
    ctx.fillStyle=col;
    const cx=kidX-12+i*4.5;
    const cy=kidY-2+Math.sin(i*1.5)*2;
    ctx.beginPath(); ctx.arc(cx,cy,2,0,Math.PI*2); ctx.fill();
  });
  // Kids
  for(let k=0;k<2;k++){
    const kx=kidX-5+k*8; const ky=kidY+6;
    ctx.fillStyle='#3a5a7a'; ctx.fillRect(kx-3,ky-8,6,12);
    ctx.fillStyle='#f5c8a0'; ctx.beginPath(); ctx.arc(kx,ky-12,3.5,0,Math.PI*2); ctx.fill();
    // School bag
    ctx.fillStyle='#5a3a2a'; ctx.fillRect(kx-4,ky-2,3,5);
  }
  // "士多" sign
  ctx.fillStyle='#8b6f3a'; ctx.fillRect(kidX-10,kidY-16,20,8);
  ctx.fillStyle='#d4a843'; ctx.font='6px sans-serif'; ctx.textAlign='center';
  ctx.fillText('士多',kidX,kidY-10);
  
  // Church on hill
  const chX=W*0.12; const chY=H*0.38;
  ctx.fillStyle='#5a4a3a'; ctx.fillRect(chX-10,chY,20,18);
  ctx.fillStyle='#7a6a4a';
  ctx.beginPath(); ctx.moveTo(chX-12,chY); ctx.lineTo(chX,chY-14); ctx.lineTo(chX+12,chY); ctx.closePath(); ctx.fill();
  // Cross
  ctx.strokeStyle='#d4a843'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(chX,chY-22); ctx.lineTo(chX,chY-6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(chX-5,chY-14); ctx.lineTo(chX+5,chY-14); ctx.stroke();
  // Bell ringing animation
  const bellSwing=Math.sin(frame*0.05)*5;
  ctx.fillStyle='#d4a843';
  ctx.beginPath(); ctx.arc(chX+bellSwing,chY-18,3,0,Math.PI*2); ctx.fill();
  // Bell sound waves
  ctx.strokeStyle=`rgba(212,168,67,${0.3-Math.abs(bellSwing)*0.05})`;
  ctx.lineWidth=1;
  for(let i=0;i<2;i++){
    ctx.beginPath();
    ctx.arc(chX,chY-18,8+i*5+Math.abs(bellSwing)*2,0,Math.PI*2);
    ctx.stroke();
  }
  
  // Peace Bridge
  ctx.strokeStyle='#6b5a4a'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(W*0.25,H*0.56); ctx.lineTo(W*0.48,H*0.56); ctx.stroke();
  ctx.strokeStyle='#5a4a3a'; ctx.lineWidth=4;
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.moveTo(W*(0.27+i*0.1),H*0.56); ctx.lineTo(W*(0.27+i*0.1),H*0.60); ctx.stroke();
  }
  
  // Stele at bridge
  ctx.fillStyle='#4a4a4a'; ctx.fillRect(W*0.24-3,H*0.52-12,6,18);
  ctx.fillStyle='#c4a060'; ctx.font='6px serif';
  ['平','安','槁'].forEach((ch,i)=>{
    ctx.fillText(ch,W*0.241,H*0.520+i*7);
  });
  
  // Villagers crossing bridge
  for(let i=0;i<3;i++){
    const vx=W*(0.25+((t*0.3+i*0.15)%0.2));
    const vy=H*0.55+Math.sin(vx*10)*2;
    ctx.fillStyle='#4a5a3a'; ctx.fillRect(vx,vy,4,8);
    ctx.fillStyle='#f5c8a0'; ctx.beginPath(); ctx.arc(vx+2,vy-3,2,0,Math.PI*2); ctx.fill();
  }
  
  // Morning birds
  for(let i=0;i<3;i++){
    const bx=W*(0.3+(frame*0.01+i*0.3)%0.7);
    const by=H*(0.15+Math.sin(bx*3+i)*0.05);
    ctx.strokeStyle=`rgba(100,100,80,${0.3+Math.sin(frame*0.02+i)*0.2})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(bx,by,4,0.2,1.2); ctx.stroke();
    ctx.beginPath(); ctx.arc(bx+4,by-1,4,1.8,2.8); ctx.stroke();
  }
  
  // Sunlight rays through trees
  if(t>0.4){
    const rayAlpha=Math.min(1,(t-0.4)*3)*0.08;
    ctx.fillStyle=`rgba(255,220,150,${rayAlpha})`;
    ctx.fillRect(W*0.3,H*0.1,2,H*0.5);
    ctx.fillRect(W*0.35,H*0.1,1.5,H*0.45);
    ctx.fillRect(W*0.42,H*0.1,1,H*0.4);
  }
  
  // Title
  if(t>0.6){
    const titleAlpha=Math.min(1,(t-0.6)*4);
    ctx.fillStyle=`rgba(212,168,67,${titleAlpha})`;
    ctx.font='bold 22px serif'; ctx.textAlign='center';
    ctx.fillText('🌅 天光墟',W/2,H*0.12);
    ctx.fillStyle=`rgba(148,163,184,${titleAlpha*0.7})`;
    ctx.font='12px sans-serif';
    ctx.fillText('山頂區清晨市集 · 每日6:00-7:00AM',W/2,H*0.12+20);
  }
  
  frame=(frame+1)%TOTAL;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
