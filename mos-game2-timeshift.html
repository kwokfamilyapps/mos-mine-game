<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>時代穿梭 1960↔2026 V1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;overflow:hidden;touch-action:none;font-family:sans-serif;color:#e2e8f0}
canvas{display:block;width:100vw;height:100dvh}
#slider-container{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:20;text-align:center;width:80%;pointer-events:none}
#slider-container input{width:100%;pointer-events:auto;cursor:pointer;height:6px;border-radius:3px;appearance:none;background:linear-gradient(90deg,#2a1f0a 0%,#87ceeb 100%)}
#slider-container input::-webkit-slider-thumb{appearance:none;width:24px;height:24px;border-radius:50%;background:#fbbf24;border:2px solid #fff;cursor:pointer;box-shadow:0 0 10px rgba(251,191,36,0.5)}
#slider-labels{display:flex;justify-content:space-between;color:#94a3b8;font-size:12px;margin-top:5px}
#hud{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:15;pointer-events:none;text-align:center}
#hud .year{font-size:28px;font-weight:bold;text-shadow:0 0 20px rgba(0,0,0,0.8)}
#hud .sub{font-size:12px;color:#94a3b8;text-shadow:0 0 10px rgba(0,0,0,0.8)}
#info{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);z-index:15;text-align:center;pointer-events:none;max-width:85vw}
#info .title{color:#fbbf24;font-size:16px;font-weight:bold;text-shadow:0 0 10px rgba(0,0,0,0.8);margin-bottom:4px}
#info .desc{color:#e2e8f0;font-size:12px;text-shadow:0 0 10px rgba(0,0,0,0.8);opacity:0.8}
</style>
</head>
<body>
<div id="hud"><div class="year" id="yearLabel">1965</div><div class="sub" id="eraLabel">馬鞍山鐵礦場 · 全盛時期</div></div>
<div id="info"><div class="title" id="locTitle">240ML 礦洞入口</div><div class="desc" id="locDesc">海拔240米，礦工每日喺度翻名牌開工</div></div>
<div id="slider-container">
  <input type="range" id="timeSlider" min="0" max="100" value="0">
  <div id="slider-labels"><span>🏭 1965 礦村</span><span>🏠 2026 新市鎮</span></div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,w=window.innerWidth,h=window.innerHeight,0.1,300);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(w,h);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.0;
document.body.prepend(renderer.domElement);

const sun=new THREE.DirectionalLight(0xffeecc,2);sun.position.set(30,40,20);
sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1;sun.shadow.camera.far=120;
sun.shadow.camera.left=-40;sun.shadow.camera.right=40;
sun.shadow.camera.top=40;sun.shadow.camera.bottom=-40;
scene.add(sun);scene.add(new THREE.AmbientLight(0x404060,0.4));
scene.add(new THREE.HemisphereLight(0x87ceeb,0x3a2a1a,0.4));

// Terrain
const g=new THREE.PlaneGeometry(100,100,40,40);const p=g.attributes.position.array;
for(let i=0;i<p.length;i+=3){const x=p[i],y=p[i+1];
p[i+2]=Math.sin(x*0.08)*Math.cos(y*0.06)*3+Math.sin(x*0.12+y*0.1)*1+Math.max(0,(12-Math.sqrt(x*x+y*y))/12*6)}
g.computeVertexNormals();
const t=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:0x4a7a3a,roughness:0.9,side:THREE.DoubleSide}));
t.rotation.x=-Math.PI/2;t.receiveShadow=true;scene.add(t);

// Background mountains
for(let i=0;i<15;i++){const a=Math.random()*Math.PI*2,d=35+Math.random()*25,h=6+Math.random()*10;
const m=new THREE.Mesh(new THREE.ConeGeometry(4+Math.random()*4,h,6),new THREE.MeshStandardMaterial({color:0x2a2a4a,flatShading:true}));
m.position.set(Math.cos(a)*d,h/2-1,Math.sin(a)*d);m.castShadow=true;scene.add(m)}

// === VIEWPOINT (fixed camera looking at center) ===
camera.position.set(-8,6,15);camera.lookAt(0,0,0);

// === 1960s OBJECTS (mine village) ===
const group1960=new THREE.Group(); scene.add(group1960);
// Mine entrance
const me=new THREE.Mesh(new THREE.BoxGeometry(5,3.5,1.5),new THREE.MeshStandardMaterial({color:0x555555,roughness:0.8}));
me.position.set(-8,1.75,3);me.castShadow=true;group1960.add(me);
const mt=new THREE.Mesh(new THREE.PlaneGeometry(3,2.5),new THREE.MeshStandardMaterial({color:0x0a0a0a,side:THREE.DoubleSide}));
mt.position.set(-8,1.5,3.5);group1960.add(mt);
const sign=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.5,0.05),new THREE.MeshStandardMaterial({color:0xffffff}));
sign.position.set(-8,3.5,3.5);group1960.add(sign);

// Church
function church(x,z,group){
const wm=new THREE.MeshStandardMaterial({color:0xf0e8d8,roughness:0.6});
const b=new THREE.Mesh(new THREE.BoxGeometry(4,3,6),wm);b.position.set(x,1.5,z);b.castShadow=true;group.add(b);
const r=new THREE.Mesh(new THREE.BoxGeometry(4.2,0.2,6.2),new THREE.MeshStandardMaterial({color:0x3a6a3a}));r.position.set(x,3.1,z);group.add(r);
const tw=new THREE.Mesh(new THREE.BoxGeometry(1.2,4.5,1.2),wm);tw.position.set(x+2,2.25,z-1);group.add(tw);
const sp=new THREE.Mesh(new THREE.ConeGeometry(0.5,1.2,4),new THREE.MeshStandardMaterial({color:0xcc3333}));sp.position.set(x+2,5.1,z-1);group.add(sp);
const cv=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.35,0.06),new THREE.MeshStandardMaterial({color:0xff0000}));cv.position.set(x+2,5.5,z-1+0.25);group.add(cv);
const ch=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.06,0.06),new THREE.MeshStandardMaterial({color:0xff0000}));ch.position.set(x+2,5.5,z-1+0.25);group.add(ch);
}
church(6,2,group1960);

// Village houses
const hData=[[-5,-1],[0,-3],[4,-4],[-3,-6],[6,-7],[-2,6],[3,5],[-6,4]];
for(const [x,z] of hData){const w=1.5+Math.random(),h=1.2+Math.random()*1;
const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,1.5+Math.random()),new THREE.MeshStandardMaterial({color:[0xd4a373,0xc49a6c,0xddd4b0][Math.floor(Math.random()*3)],roughness:0.7}));
b.position.set(x,h/2,z);b.castShadow=true;group1960.add(b);
const rr=new THREE.Mesh(new THREE.BoxGeometry(w+0.1,0.1,1.7),new THREE.MeshStandardMaterial({color:[0xcc6644,0xbb5533][Math.floor(Math.random()*2)]}));
rr.position.set(x,h+0.05,z);group1960.add(rr)}

// Mine cart
const cart=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.4,1),new THREE.MeshStandardMaterial({color:0x6b4f30,roughness:0.6,metalness:0.3}));
cart.position.set(-6,0.2,-2);group1960.add(cart);
const ore=new THREE.Mesh(new THREE.SphereGeometry(0.25,5,5),new THREE.MeshStandardMaterial({color:0x555566,roughness:0.8}));
ore.position.set(-6,0.5,-1.9);ore.scale.set(1.5,0.5,1);group1960.add(ore);

// Trees (1960s)
for(let i=0;i<15;i++){const x=(Math.random()-0.5)*20,z=(Math.random()-0.5)*20;
const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.12,0.6,4),new THREE.MeshStandardMaterial({color:0x4a3520}));
tr.position.set(x,0.3,z);group1960.add(tr);
const f=new THREE.Mesh(new THREE.SphereGeometry(0.3+Math.random()*0.3,4,4),new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.3+Math.random()*0.1,0.4,0.2)}));
f.position.set(x,0.8+Math.random()*0.3,z);group1960.add(f)}

// === 2026 OBJECTS (modern Ma On Shan) ===
const group2026=new THREE.Group(); scene.add(group2026);
// Modern buildings
for(let x=-8;x<=8;x+=3.5){for(let z=-6;z<=8;z+=3.5){if(Math.abs(x)<1&&Math.abs(z)<1)continue;
const hh=3+Math.random()*6;
const b=new THREE.Mesh(new THREE.BoxGeometry(2.5,hh,2.5),new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.55+Math.random()*0.1,0.1,0.5+Math.random()*0.3),roughness:0.6}));
b.position.set(x,hh/2,z);b.castShadow=true;group2026.add(b);
for(let f=0;f<Math.floor(hh/2);f++){const win=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.2,0.05),new THREE.MeshStandardMaterial({color:0x88bbdd,emissive:0x446688,emissiveIntensity:0.2}));
win.position.set(x+0.6,0.5+f*2,z+1.26);group2026.add(win);}}}

// Cars
for(let i=0;i<6;i++){const c=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.2,1),new THREE.MeshStandardMaterial({color:[0xff4444,0x4488ff,0xffffff,0x444444][Math.floor(Math.random()*4)],roughness:0.3,metalness:0.5}));
c.position.set((Math.random()-0.5)*25,0.1,(Math.random()-0.5)*20);group2026.add(c)}

// Street lights
for(let x=-10;x<=10;x+=4){const p=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.04,1.2,4),new THREE.MeshStandardMaterial({color:0x666666,metalness:0.5}));
p.position.set(x,0.6,-5);group2026.add(p);
const l=new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6),new THREE.MeshStandardMaterial({color:0xfbbf24,emissive:0xfbbf24,emissiveIntensity:0.5}));
l.position.set(x,1.3,-5);group2026.add(l)}

// Road
const rd=new THREE.Mesh(new THREE.BoxGeometry(20,0.05,3),new THREE.MeshStandardMaterial({color:0x444444,roughness:0.9}));
rd.position.set(0,0.02,-5);scene.add(rd);

// Fade 1960 visible, 2026 hidden
group1960.visible=true; group2026.visible=false;

let sliderVal=0;
document.getElementById('timeSlider').addEventListener('input',function(){
 sliderVal=this.value/100;
 // 0 = 1965, 1 = 2026
 const year=Math.round(1965+(2026-1965)*sliderVal);
 const yearEl=document.getElementById('yearLabel');
 yearEl.textContent=year;
 yearEl.style.color=sliderVal<0.5?'#d4a843':'#38bdf8';
 document.getElementById('eraLabel').textContent=sliderVal<0.3?'馬鞍山鐵礦場 · 全盛時期':sliderVal<0.6?'礦場結業 · 轉變中':'馬鞍山新市鎮';
 
 // Crossfade
 group1960.visible=sliderVal<0.5;
 group2026.visible=sliderVal>=0.5;
 
 // Scene background
 if(sliderVal<0.3)scene.background=new THREE.Color(0x87ceeb);
 else if(sliderVal<0.6)scene.background=new THREE.Color(0x8a9ab0);
 else scene.background=new THREE.Color(0x6a7a8a);
 
 // Terrain color
 const col=sliderVal<0.5?0x4a7a3a:0x5a8a4a;
 t.material.color.setHex(col);
});
</script>
</body>
</html>
