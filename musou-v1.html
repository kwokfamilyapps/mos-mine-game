<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>礦村無雙 V1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{background:#0a0e1a;display:flex;justify-content:center;align-items:center;min-height:100dvh;font-family:"Segoe UI",sans-serif;touch-action:none;overflow:hidden}
canvas{border:2px solid #1e2a3a;border-radius:8px;max-width:100vw;max-height:100dvh;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
const c = document.getElementById('gc'), cx = c.getContext('2d');
const W = 500, H = 720;
c.width = W; c.height = H;

function resize() {
  const mw = window.innerWidth-4, mh = window.innerHeight-4;
  const s = Math.min(mw/W, mh/H);
  c.style.width = (W*s)+'px'; c.style.height = (H*s)+'px';
}
resize(); window.addEventListener('resize', resize);

// === INPUT ===
const inp = { left:0, right:0, up:0, down:0, atk:0, jump:0, tap:0, tapX:0, tapY:0 };
c.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const r = c.getBoundingClientRect();
    const x = t.clientX - r.left, y = t.clientY - r.top;
    const sx = x/r.width*W, sy = y/r.height*H;
    inp.tap=1; inp.tapX=sx; inp.tapY=sy;
    if (sy > H-140) {
      if (sx < W/3) inp.left = 1;
      else if (sx > W*2/3) inp.right = 1;
      else inp.jump = 1;
    } else if (sx > W-100 && sy > H-250) {
      inp.atk = 1;
    }
  }
});
c.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const r = c.getBoundingClientRect();
    const x = t.clientX - r.left, y = t.clientY - r.top;
    const sx = x/r.width*W, sy = y/r.height*H;
    if (sy > H-140) {
      inp.left = sx < W/3 ? 1 : 0;
      inp.right = sx > W*2/3 ? 1 : 0;
    }
  }
});
c.addEventListener('touchend', e => {
  e.preventDefault();
  inp.left = 0; inp.right = 0; inp.jump = 0;
  // atk & tap cleared by game loop after processing
});
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowLeft': case 'a': inp.left=1; e.preventDefault(); break;
    case 'ArrowRight': case 'd': inp.right=1; e.preventDefault(); break;
    case 'ArrowUp': case 'w': inp.jump=1; e.preventDefault(); break;
    case ' ': case 'j': case 'z': inp.atk=1; e.preventDefault(); break;
    case 'Enter': inp.atk=1; e.preventDefault(); break;
  }
});
document.addEventListener('keyup', e => {
  switch(e.key) {
    case 'ArrowLeft': case 'a': inp.left=0; e.preventDefault(); break;
    case 'ArrowRight': case 'd': inp.right=0; e.preventDefault(); break;
    case 'ArrowUp': case 'w': inp.jump=0; e.preventDefault(); break;
    case ' ': case 'j': case 'z': inp.atk=0; e.preventDefault(); break;
  }
});

// === GAME STATE ===
let state = 'title'; // title, playing, gameover, win
let score = 0, highScore = parseInt(localStorage.getItem('musouHigh')||'0');
let combo = 0, maxCombo = 0, kills = 0;
let musouGauge = 0, maxMusou = 100;
let gameTime = 0, enemyTimer = 0, waveNum = 1;
let scorePopup = [];
let particles = [];
let screenShake = 0;

// === PLAYER ===
const p = {
  x: 200, y: H-150, w: 30, h: 50,
  vx: 0, vy: 0, dir: 1, speed: 4,
  hp: 100, maxHp: 100,
  atkTimer: 0, atkFrame: 0,
  invTimer: 0, hitTimer: 0,
  jumping: false, onGround: true,
  musouActive: false, musouTimer: 0,
  comboChain: 0
};

// === ENEMIES ===
let enemies = [];

// === BACKGROUND ===
let scrollX = 0;

// === WEAPON ===
function getWeapon() { return { range: 40, dmg: 10 + combo*0.5 }; }

// === DRAW HELPERS ===
function rr(x,y,w,h,r,fill,stroke) {
  cx.beginPath(); cx.moveTo(x+r,y); cx.lineTo(x+w-r,y);
  cx.quadraticCurveTo(x+w,y,x+w,y+r); cx.lineTo(x+w,y+h-r);
  cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); cx.lineTo(x+r,y+h);
  cx.quadraticCurveTo(x,y+h,x,y+h-r); cx.lineTo(x,y+r);
  cx.quadraticCurveTo(x,y,x+r,y); cx.closePath();
  if(fill){cx.fillStyle=fill;cx.fill()}
  if(stroke){cx.strokeStyle=stroke;cx.lineWidth=2;cx.stroke()}
}

// === SPAWN ENEMY ===
function spawnEnemy() {
  const side = Math.random() < 0.5 ? -1 : 1;
  const types = ['步兵','槍兵','弓兵','隊長'];
  const type = waveNum < 3 ? types[Math.floor(Math.random()*2)]
    : types[Math.floor(Math.random()*types.length)];
  const hpMap = {'步兵':25,'槍兵':35,'弓兵':20,'隊長':60};
  const spdMap = {'步兵':1.5,'槍兵':1.2,'弓兵':1.8,'隊長':0.8};
  const atkMap = {'步兵':8,'槍兵':12,'弓兵':6,'隊長':15};
  const d = 30 + Math.random()*60;
  enemies.push({
    x: side > 0 ? -d : W + d,
    y: H-150, w: 25, h: 45,
    hp: hpMap[type], maxHp: hpMap[type],
    speed: spdMap[type] + waveNum*0.1,
    atk: atkMap[type] + waveNum*1,
    type: type,
    dir: -side,
    hitTimer: 0,
    atkCooldown: 0,
    vx: 0
  });
}

// === SPAWN WAVE ===
function spawnWave() {
  const n = 3 + waveNum * 2;
  for (let i = 0; i < Math.min(n, 12); i++) {
    setTimeout(() => spawnEnemy(), i * 200);
  }
}

// === UPDATE ===
function update() {
  if (state !== 'playing') return;
  gameTime++;

  // Scene scroll
  scrollX += 0.5;
  if (scrollX > 800) scrollX = 0;

  // Player gravity
  p.vy += 0.7;
  p.y += p.vy;
  const groundY = H-150;
  if (p.y >= groundY) { p.y = groundY; p.vy = 0; p.onGround = true; p.jumping = false; }
  else p.onGround = false;

  // Player movement
  if (!p.musouActive) {
    if (inp.left) { p.vx = -p.speed; p.dir = -1; }
    else if (inp.right) { p.vx = p.speed; p.dir = 1; }
    else p.vx *= 0.8;
    if (inp.jump && p.onGround) { p.vy = -12; p.jumping = true; inp.jump = 0; }
  } else {
    p.vx = p.dir * p.speed * 1.5;
    p.musouTimer--;
    if (p.musouTimer <= 0) { p.musouActive = false; p.atkTimer = 30; }
  }
  p.x += p.vx;
  p.x = Math.max(20, Math.min(W-20-p.w, p.x));

  // Attack
  if (inp.atk && p.atkTimer <= 0 && !p.musouActive) {
  inp.atk = 0; // consume the trigger
  p.atkTimer = 15;
    p.atkFrame = 10;
    const w = getWeapon();
    // Hit check
    for (let i = enemies.length-1; i >= 0; i--) {
      const e = enemies[i];
      const dx = Math.abs(p.x + p.w/2 - (e.x + e.w/2));
      const dy = Math.abs(p.y + p.h/2 - (e.y + e.h/2));
      if (dx < w.range + e.w/2 && dy < 60) {
        const crit = Math.random() < 0.15 ? 2 : 1;
        const dmg = w.dmg * crit;
        e.hp -= dmg;
        e.hitTimer = 8;
        e.vx = p.dir * 5;
        combo++;
        score += Math.floor(dmg);
        musouGauge = Math.min(maxMusou, musouGauge + 5);
        screenShake = 3;
        // Popup
        const txt = crit > 1 ? `💥暴擊! ${dmg}` : `-${dmg}`;
        scorePopup.push({x:e.x+12, y:e.y-10, text:txt, life:30, color: crit>1?'#ff4444':'#ffd700'});
        particles.push({x:e.x+12,y:e.y+20,vx:(Math.random()-0.5)*6,vy:-3,life:15,color:'#ffd700'});
        if (e.hp <= 0) {
          kills++;
          score += 50;
          particles.push({x:e.x+12,y:e.y+20,vx:0,vy:-8,life:25,color:'#ff4444'});
          setTimeout(() => {
            for (let k = 0; k < 8; k++) {
              particles.push({
                x:e.x+12, y:e.y+20,
                vx:(Math.random()-0.5)*10, vy:-3-Math.random()*5,
                life:20, color:['#ffd700','#ff6b6b','#fbbf24'][Math.floor(Math.random()*3)]
              });
            }
          }, 0);
        }
        inp.atk = 0;
      }
    }
  }

  // Musuo activate
  if (inp.atk && musouGauge >= maxMusou && !p.musouActive && p.atkTimer <= 0) {
    p.musouActive = true;
    p.musouTimer = 60; // 1 sec of invincible rampage
    musouGauge = 0;
    // Auto-damage all enemies
    for (let i = enemies.length-1; i >= 0; i--) {
      const e = enemies[i];
      e.hp -= 40;
      e.hitTimer = 20;
      e.vx = (e.x > p.x ? 10 : -10);
      score += 30;
      particles.push({x:e.x+12,y:e.y+20,vx:0,vy:-5,life:30,color:'#ff4444'});
      screenShake = 10;
      if (e.hp <= 0) { kills++; score += 100; enemies.splice(i,1); }
    }
    inp.atk = 0;
  }

  if (p.atkTimer > 0) p.atkTimer--;
  if (p.invTimer > 0) p.invTimer--;
  if (p.hitTimer > 0) p.hitTimer--;

  // Enemies
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    // Move toward player
    const dx = p.x - e.x;
    e.dir = dx > 0 ? 1 : -1;
    if (!e.hitTimer) {
      e.x += e.dir * e.speed;
      if (Math.abs(dx) < 50 && e.atkCooldown <= 0) {
        // Enemy attacks
        if (p.invTimer <= 0) {
          p.hp -= e.atk * 0.5;
          p.invTimer = 20;
          p.hitTimer = 5;
          screenShake = 5;
          particles.push({x:p.x+15,y:p.y+20,vx:(Math.random()-0.5)*6,vy:-3,life:15,color:'#ff6b6b'});
          combo = 0;
          if (p.hp <= 0) {
            state = 'gameover';
            if (score > highScore) { highScore = score; localStorage.setItem('musouHigh', String(highScore)); }
          }
        }
        e.atkCooldown = 30;
      }
    } else {
      e.x += e.vx;
      e.vx *= 0.8;
      e.hitTimer--;
    }
    if (e.atkCooldown > 0) e.atkCooldown--;
    if (e.x < -100 || e.x > W+100) enemies.splice(i,1);
  }

  // Score popups
  for (let i = scorePopup.length-1; i >= 0; i--) {
    const s = scorePopup[i];
    s.y -= 1.5; s.life--;
    if (s.life <= 0) scorePopup.splice(i,1);
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const pt = particles[i];
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.2; pt.life--;
    if (pt.life <= 0) particles.splice(i,1);
  }

  // Wave spawning
  enemyTimer--;
  if (enemyTimer <= 0) {
    if (enemies.length < 8 + waveNum) {
      spawnEnemy();
      if (Math.random() < 0.3) spawnEnemy();
    }
    enemyTimer = Math.max(15, 40 - waveNum * 2);
  }

  // Wave progress
  const killsForNext = 8 + waveNum * 4;
  if (kills >= killsForNext) {
    waveNum++;
    combo += 5;
    score += 200;
    particles.push({x:W/2,y:200,vx:0,vy:-2,life:60,color:'#fbbf24'});
    if (waveNum > 10) {
      state = 'win';
      if (score > highScore) { highScore = score; localStorage.setItem('musouHigh', String(highScore)); }
    }
  }

  if (screenShake > 0) screenShake--;
}

// === DRAW ===
function draw() {
  cx.save();
  if (screenShake > 0) {
    cx.translate((Math.random()-0.5)*screenShake*2, (Math.random()-0.5)*screenShake*2);
  }

  switch(state) {
    case 'title': drawTitle(); break;
    case 'playing': drawPlay(); break;
    case 'gameover': drawOver(); break;
    case 'win': drawWin(); break;
  }
  cx.restore();
}

function drawBackground() {
  const g = cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a1a2e'); g.addColorStop(0.4,'#16213e'); g.addColorStop(1,'#0f3460');
  cx.fillStyle = g; cx.fillRect(0,0,W,H);

  // Ground
  cx.fillStyle = '#2d1b00';
  cx.fillRect(0,H-130,W,130);
  cx.fillStyle = '#3a2a15';
  cx.fillRect(0,H-130,W,6);

  // Distant mountains
  cx.fillStyle = '#1a1a2e';
  for (let i=0;i<6;i++) {
    const mx = (i*120-scrollX*0.2)%(W+150)-75;
    cx.beginPath();
    cx.moveTo(mx-30,H-130);
    cx.lineTo(mx+30,H-200-30*Math.sin(i*1.2));
    cx.lineTo(mx+90,H-130);
    cx.fill();
  }

  // Buildings silhouette
  cx.fillStyle = '#1a1a2e';
  for (let i=0;i<4;i++) {
    const bx = (i*150-scrollX*0.3)%(W+200)-100;
    cx.fillRect(bx, H-190, 40, 60);
    cx.fillRect(bx+10, H-210, 20, 20);
  }
}

function drawTitle() {
  drawBackground();

  cx.textAlign = 'center'; cx.textBaseline = 'middle';

  cx.font = 'bold 26px sans-serif';
  cx.fillStyle = '#fbbf24';
  cx.fillText('⛏️ 礦 村 無 雙 ⛏️', W/2, 150);

  cx.font = 'bold 36px sans-serif';
  cx.fillStyle = '#f87171';
  cx.fillText('礦 工 戰 記', W/2, 200);

  cx.font = '14px sans-serif';
  cx.fillStyle = '#38bdf8';
  cx.fillText('參照《真三無雙天下》玩法 · V1 測試版', W/2, 240);

  cx.strokeStyle = '#d4a843'; cx.lineWidth = 2;
  cx.beginPath(); cx.moveTo(60,270); cx.lineTo(W-60,270); cx.stroke();

  cx.font = '14px sans-serif';
  cx.fillStyle = '#94a3b8';
  cx.fillText('👊 橫向無雙動作 · 消滅黃巾賊兵', W/2, 310);
  cx.fillText('🔥 連段蓄無雙 · 一騎當千！', W/2, 335);

  // Start button
  rr(W/2-110, 380, 220, 55, 10, '#5c1a1a', '#f87171');
  cx.fillStyle = '#f87171';
  cx.font = 'bold 22px sans-serif';
  cx.fillText('⚔️ 開始征戰', W/2, 407);

  cx.fillStyle = '#475569';
  cx.font = '11px sans-serif';
  cx.fillText('📱 左下移動 · 右下跳 · 右上攻擊', W/2, 500);
  cx.fillText('⌨️ 方向鍵移動 · 空白/J攻擊', W/2, 520);
  cx.fillText('🔥 無雙滿時按攻擊釋放無雙亂舞！', W/2, 540);

  if (highScore > 0) {
    cx.fillStyle = '#fbbf24';
    cx.font = '14px sans-serif';
    cx.fillText(`🏆 最高記錄: ${highScore}`, W/2, 580);
  }

  cx.fillStyle = '#2d3748';
  cx.font = '10px sans-serif';
  cx.fillText('礦村無雙 V1 · 2026', W/2, 680);
}

function resetGame() {
  p.x = 200; p.y = H-150; p.vx = 0; p.vy = 0; p.dir = 1;
  p.hp = 100; p.maxHp = 100;
  p.atkTimer = 0; p.invTimer = 0; p.hitTimer = 0;
  p.onGround = true; p.jumping = false;
  p.musouActive = false; p.musouTimer = 0;
  score = 0; combo = 0; maxCombo = 0; kills = 0;
  musouGauge = 0; gameTime = 0; enemyTimer = 20; waveNum = 1;
  enemies = []; scorePopup = []; particles = [];
  screenShake = 0; scrollX = 0;
}

function drawPlay() {
  drawBackground();

  // Draw enemies
  for (const e of enemies) {
    const flash = e.hitTimer > 0 && e.hitTimer%3===0;
    cx.save();

    // Shadow
    cx.fillStyle = 'rgba(0,0,0,0.2)';
    cx.beginPath(); cx.ellipse(e.x+12, H-128, 10, 3, 0, 0, Math.PI*2); cx.fill();

    cx.translate(e.x+12, e.y+22);

    // Flip facing
    if (e.dir < 0) cx.scale(-1,1);

    // Body
    const colors = {'步兵':'#c0392b','槍兵':'#2980b9','弓兵':'#27ae60','隊長':'#8e44ad'};
    cx.fillStyle = flash ? '#fff' : (colors[e.type]||'#c0392b');
    cx.fillRect(-10, -15, 20, 30);

    // Head
    cx.fillStyle = '#f4a460';
    cx.fillRect(-7, -22, 14, 10);

    // Helmet
    cx.fillStyle = '#7f8c8d';
    cx.fillRect(-9, -26, 18, 6);
    cx.fillRect(-5, -32, 10, 7);

    // Weapon
    cx.fillStyle = '#bdc3c7';
    if (e.type === '槍兵') {
      cx.fillRect(8, -12, 3, 20);
      cx.fillRect(8, -14, 3, 3);
    } else if (e.type === '弓兵') {
      cx.fillRect(8, -5, 2, 15);
    } else {
      cx.fillRect(8, -8, 4, 14);
    }

    cx.restore();

    // HP bar
    const hpPct = e.hp/e.maxHp;
    cx.fillStyle = '#333';
    cx.fillRect(e.x, e.y-8, 24, 4);
    cx.fillStyle = hpPct > 0.5 ? '#4ade80' : hpPct > 0.25 ? '#fbbf24' : '#f87171';
    cx.fillRect(e.x, e.y-8, 24*hpPct, 4);

    // Type label
    cx.fillStyle = '#94a3b8'; cx.font = '8px sans-serif';
    cx.textAlign = 'center';
    cx.fillText(e.type, e.x+12, e.y-12);
  }

  // Draw player
  cx.save();
  if (p.invTimer > 0 && Math.floor(p.invTimer/3)%2===0) cx.globalAlpha = 0.5;

  // Shadow
  cx.fillStyle = 'rgba(0,0,0,0.3)';
  cx.beginPath(); cx.ellipse(p.x+15, H-128, 12, 4, 0, 0, Math.PI*2); cx.fill();

  // Player direction
  cx.translate(p.x+15, p.y+25);
  if (p.dir < 0) cx.scale(-1,1);

  if (p.musouActive) {
    // Musou aura
    cx.shadowColor = '#fbbf24'; cx.shadowBlur = 20;
  }

  // Body - 礦工
  cx.fillStyle = '#d4a373';
  cx.fillRect(-12, -18, 24, 32);
  // Shirt
  cx.fillStyle = '#5c4033';
  cx.fillRect(-12, -10, 24, 18);

  // Head
  cx.fillStyle = '#f4a460';
  cx.fillRect(-9, -26, 18, 12);
  // Hat (miner helmet)
  cx.fillStyle = '#ffd700';
  cx.fillRect(-11, -30, 22, 5);
  cx.fillRect(-6, -36, 12, 8);
  // Headlamp
  cx.fillStyle = '#fbbf24';
  cx.fillRect(-4, -36, 8, 3);

  // Eyes
  cx.fillStyle = '#000';
  cx.fillRect(-4, -22, 3, 3);
  cx.fillRect(2, -22, 3, 3);

  // Weapon (mining pickaxe)
  if (p.atkTimer > 5) {
    cx.fillStyle = '#8B4513';
    cx.save();
    cx.translate(15, -5);
    cx.rotate(-1);
    cx.fillRect(-2, 0, 4, 25);
    cx.fillStyle = '#A0522D';
    cx.fillRect(-4, 20, 8, 6);
    cx.fillRect(-6, 24, 12, 4);
    cx.restore();
  } else {
    // Idle pickaxe
    cx.fillStyle = '#8B4513';
    cx.fillRect(14, -5, 3, 22);
    cx.fillStyle = '#A0522D';
    cx.fillRect(12, 15, 7, 5);
    cx.fillRect(10, 19, 10, 3);
  }

  // Legs
  if (!p.onGround) {
    // Jumping pose
    cx.fillStyle = '#2d1b00';
    cx.fillRect(-8, 14, 6, 12);
    cx.fillRect(2, 14, 6, 12);
  } else if (Math.abs(p.vx) > 1) {
    // Walking
    const legOff = Math.floor(gameTime/5)%2;
    cx.fillStyle = '#2d1b00';
    cx.fillRect(-8+legOff*2, 14, 6, 12);
    cx.fillRect(2-legOff*2, 14, 6, 12);
  } else {
    cx.fillStyle = '#2d1b00';
    cx.fillRect(-8, 14, 6, 12);
    cx.fillRect(2, 14, 6, 12);
  }

  cx.restore();

  // Particles
  for (const pt of particles) {
    cx.globalAlpha = pt.life/20;
    cx.fillStyle = pt.color;
    cx.fillRect(pt.x-2, pt.y-2, 4, 4);
  }
  cx.globalAlpha = 1;

  // Score popups
  for (const s of scorePopup) {
    cx.globalAlpha = s.life/30;
    cx.fillStyle = s.color;
    cx.font = 'bold 14px sans-serif';
    cx.textAlign = 'center';
    cx.fillText(s.text, s.x, s.y);
  }
  cx.globalAlpha = 1;

  // === HUD ===
  // Top bar
  cx.fillStyle = 'rgba(0,0,0,0.7)';
  rr(5, 5, W-10, 50, 8, 'rgba(0,0,0,0.6)', null);

  // Wave
  cx.fillStyle = '#94a3b8';
  cx.font = '12px sans-serif';
  cx.textAlign = 'left'; cx.textBaseline = 'middle';
  cx.fillText(`📜 第 ${waveNum} 波`, 15, 22);

  // Kills
  cx.fillStyle = '#f87171';
  cx.font = '12px sans-serif';
  cx.fillText(`💀 斬 ${kills}`, 15, 40);

  // Score
  cx.textAlign = 'right';
  cx.fillStyle = '#ffd700';
  cx.font = 'bold 18px sans-serif';
  cx.fillText(`💰 ${score}`, W-15, 22);

  // High score
  cx.fillStyle = '#475569';
  cx.font = '10px sans-serif';
  cx.fillText(`最高: ${highScore}`, W-15, 40);

  // Combo
  if (combo >= 3) {
    cx.textAlign = 'center';
    cx.fillStyle = '#fbbf24';
    cx.font = 'bold 16px sans-serif';
    cx.fillText(`🔥 ${combo} COMBO!`, W/2, 22);
  }

  // Progress bar (next wave)
  const killsForNext = 8 + waveNum * 4;
  const prog = Math.min(kills / killsForNext, 1);
  cx.fillStyle = '#1e2a3a';
  rr(60, 35, W-120, 8, 4, '#1e2a3a', null);
  cx.fillStyle = '#f87171';
  rr(60, 35, (W-120)*prog, 8, 4, '#f87171', null);

  // === HP & MUSOU BARS ===
  // HP Bar
  cx.fillStyle = 'rgba(0,0,0,0.6)';
  rr(8, 62, 120, 18, 6, 'rgba(0,0,0,0.5)', null);
  cx.fillStyle = p.hp > 50 ? '#4ade80' : p.hp > 25 ? '#fbbf24' : '#f87171';
  rr(10, 64, 116*(p.hp/p.maxHp), 14, 5, cx.fillStyle, null);
  cx.fillStyle = '#fff';
  cx.font = 'bold 10px sans-serif';
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText(`❤️ ${Math.ceil(p.hp)}/${p.maxHp}`, 68, 72);

  // Musou gauge
  cx.fillStyle = 'rgba(0,0,0,0.6)';
  rr(8, 85, 120, 16, 6, 'rgba(0,0,0,0.5)', null);
  cx.fillStyle = musouGauge >= maxMusou ? '#fbbf24' : '#e67e22';
  rr(10, 87, 116*(musouGauge/maxMusou), 12, 5, cx.fillStyle, null);
  cx.fillStyle = musouGauge >= maxMusou ? '#fbbf24' : '#94a3b8';
  cx.font = 'bold 9px sans-serif';
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText(musouGauge >= maxMusou ? '🔥 無雙滿！按攻擊釋放！' : '⚡ 無雙', 68, 93);

  // === TOUCH BUTTONS ===
  // Left/Right zone
  cx.fillStyle = 'rgba(255,255,255,0.08)';
  rr(5, H-135, W/3, 130, 8, 'rgba(255,255,255,0.05)', null);
  cx.fillStyle = 'rgba(255,255,255,0.2)';
  cx.font = '20px sans-serif'; cx.textAlign = 'center';
  cx.fillText('◀', 30, H-70); cx.fillText('▶', W/6, H-70);

  // Jump zone
  rr(W/3+5, H-135, W/3-10, 130, 8, 'rgba(255,255,255,0.05)', null);
  cx.fillStyle = 'rgba(255,255,255,0.2)';
  cx.font = '20px sans-serif';
  cx.fillText('⬆ 跳', W/2, H-70);

  // Attack zone
  rr(W*2/3+5, H-135, W/3-10, 130, 8, musouGauge >= maxMusou ? 'rgba(251,191,36,0.15)' : 'rgba(255,255,255,0.05)', null);
  cx.fillStyle = musouGauge >= maxMusou ? '#fbbf24' : 'rgba(255,255,255,0.3)';
  cx.font = musouGauge >= maxMusou ? 'bold 16px sans-serif' : '14px sans-serif';
  cx.fillText(musouGauge >= maxMusou ? '🔥無雙' : '⚔攻擊', W-60, H-70);
}

function drawOver() {
  drawPlay();
  cx.fillStyle = 'rgba(0,0,0,0.7)';
  cx.fillRect(0,0,W,H);

  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.font = 'bold 36px sans-serif';
  cx.fillStyle = '#f87171';
  cx.fillText('💀 戰敗', W/2, 160);

  cx.font = 'bold 22px sans-serif';
  cx.fillStyle = '#ffd700';
  cx.fillText(`💰 分數: ${score}`, W/2, 230);

  cx.font = '16px sans-serif';
  cx.fillStyle = '#94a3b8';
  cx.fillText(`💀 擊殺: ${kills}  |  🔥 最大連段: ${maxCombo}  |  📜 到達: 第${waveNum}波`, W/2, 270);

  if (score >= highScore && score > 0) {
    cx.fillStyle = '#fbbf24';
    cx.font = 'bold 18px sans-serif';
    cx.fillText('🏆 新紀錄！', W/2, 310);
  }

  rr(W/2-110, 360, 220, 55, 10, '#5c1a1a', '#f87171');
  cx.fillStyle = '#f87171';
  cx.font = 'bold 20px sans-serif';
  cx.fillText('🔄 再戰', W/2, 387);

  rr(W/2-110, 430, 220, 45, 8, '#1e2a3a', '#94a3b8');
  cx.fillStyle = '#94a3b8';
  cx.font = '16px sans-serif';
  cx.fillText('🏠 返回', W/2, 452);
}

function drawWin() {
  drawPlay();
  cx.fillStyle = 'rgba(0,0,0,0.6)';
  cx.fillRect(0,0,W,H);

  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.font = 'bold 30px sans-serif';
  cx.fillStyle = '#4ade80';
  cx.fillText('🎉 勝利！', W/2, 150);
  cx.font = '18px sans-serif';
  cx.fillStyle = '#fbbf24';
  cx.fillText('成功抵擋所有黃巾賊兵！', W/2, 200);

  cx.font = 'bold 22px sans-serif';
  cx.fillStyle = '#ffd700';
  cx.fillText(`💰 總分: ${score}`, W/2, 260);
  cx.fillStyle = '#94a3b8';
  cx.font = '14px sans-serif';
  cx.fillText(`💀 擊殺: ${kills}  |  🔥 最大連段: ${maxCombo}`, W/2, 290);

  rr(W/2-110, 350, 220, 55, 10, '#14532d', '#4ade80');
  cx.fillStyle = '#4ade80';
  cx.font = 'bold 20px sans-serif';
  cx.fillText('🔄 再玩', W/2, 377);
}

// === LOOP ===
function loop() {
  // Handle state transitions from tap
  if (state === 'title') {
    // Check if tap on start button area (center of screen)
    if (inp.tap || inp.atk || inp.jump) {
      inp.tap=0; inp.atk=0; inp.jump=0;
      state = 'playing'; resetGame();
    }
  } else if (state === 'gameover') {
    if (inp.tap || inp.atk || inp.jump) {
      inp.tap=0; inp.atk=0; inp.jump=0;
      state = 'title';
    }
  } else if (state === 'win') {
    if (inp.tap || inp.atk || inp.jump) {
      inp.tap=0; inp.atk=0; inp.jump=0;
      state = 'title';
    }
  } else if (state === 'playing') {
    // Clear attack trigger after processing (so it doesn't repeat)
    // Reset atk after it's been read in update
  }

  // Clear one-shot input flags
  if (inp.tap) inp.tap = 0;

  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
